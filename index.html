<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#004d42">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Permissions-Policy" content="geolocation=(self)">
<meta http-equiv="Feature-Policy" content="geolocation 'self'">
<meta name="est-version" content="2.0.1">
<link rel="manifest" href="./manifest.json">
<title>EST — Entomological Surveillance Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./offline-styles.css">
<style>
:root{
  --primary:#006b5c;--pl:#00bfa5;--pd:#44ddc1;--pb:#68fadd;
  --sf:#f0f4f3;--sfl:#e8edeb;--sfc:#ffffff;
  --os:#191c1d;--osv:#3c4a46;--ol:#6c7a76;--olv:#bbcac4;
  --err:#ba1a1a;--errbg:#ffdad6;--wbg:#fff8e1;--gbg:#e6f7f4;
  --amber:#b45309;--amberbg:#fffbeb;
  --adult:#006b5c;--adultl:#e6f7f4;--larval:#1565c0;--larvall:#e3f2fd;
  --mono:'IBM Plex Mono',monospace;--sans:'DM Sans',sans-serif;
  --rsm:6px;--rmd:10px;--rlg:16px;--rxl:22px;
  --touch:48px;--hh:60px;--nh:66px;--tr:.22s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;height:-webkit-fill-available;width:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--primary);color:var(--os);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;touch-action:manipulation;}
@supports(padding-bottom:env(safe-area-inset-bottom)){
  #app-nav{padding-bottom:calc(8px + env(safe-area-inset-bottom));}
  #app-header{padding-top:env(safe-area-inset-top);}
}
#app-header,#app-nav{display:none;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--sf);opacity:0;pointer-events:none;visibility:hidden;z-index:1;transition:opacity .3s ease,transform .3s cubic-bezier(.4,0,.2,1);transform:translateY(10px);}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0);visibility:visible;}
#splash{background:linear-gradient(160deg,#002d26 0%,#004d42 45%,#006b5c 100%);align-items:center;justify-content:center;overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:9999;visibility:visible;opacity:1;transform:none;}
.sbg{position:absolute;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none;}
.sbg.c1{width:360px;height:360px;top:-90px;right:-90px;}
.sbg.c2{width:240px;height:240px;bottom:100px;left:-70px;}
.sbg.c3{width:160px;height:160px;bottom:220px;right:10px;}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:calc(var(--hh)+14px) 14px calc(var(--nh)+22px);}
.scroll-area::-webkit-scrollbar{display:none;}
#app-header{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--hh);background:rgba(240,244,243,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--olv);align-items:center;justify-content:space-between;padding:0 14px;display:flex;}
.hbrand{display:flex;align-items:center;gap:8px;}
.htitle{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--os);}
.hsub{font-size:9px;color:var(--osv);letter-spacing:.06em;text-transform:uppercase;}
.hmod-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.hmod-badge.adult{background:var(--adultl);color:var(--adult);}
.hmod-badge.larval{background:var(--larvall);color:var(--larval);}
.sync-btn{width:40px;height:40px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ol);}
#app-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;height:var(--nh);background:rgba(240,244,243,.99);border-top:1px solid var(--olv);align-items:center;justify-content:space-around;padding:8px 0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:var(--touch);border:none;background:transparent;cursor:pointer;border-radius:var(--rmd);color:var(--osv);transition:all var(--tr);}
.nav-btn.active{color:var(--primary);background:rgba(0,107,92,.08);}
.nav-btn.larval-active{color:var(--larval);background:rgba(21,101,192,.08);}
.page-title{font-size:22px;font-weight:700;color:var(--os);margin-bottom:4px;}
.page-accent{height:3px;width:36px;border-radius:2px;margin-bottom:20px;}
.page-accent.adult{background:var(--pl);}
.page-accent.larval{background:var(--larval);}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:11px;}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--osv);}
.divider{height:1px;background:var(--olv);margin:18px 0;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.flabel{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--osv);}
.field input,.field select,.field textarea{width:100%;height:var(--touch);padding:0 13px;background:var(--sfc);border:2px solid var(--olv);border-radius:var(--rmd);font-family:var(--mono);font-size:14px;color:var(--os);appearance:none;-webkit-appearance:none;}
.field textarea{height:auto;padding:11px 13px;font-family:var(--sans);font-size:14px;resize:none;}
.field input[type="time"]{padding:0 10px;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);}
.field-err{font-size:10px;color:var(--err);display:none;margin-top:3px;}
.sel-wrap{position:relative;}
.sel-wrap::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--ol);pointer-events:none;font-size:16px;}
.sel-wrap select{padding-right:38px;cursor:pointer;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px;}
.btn-p{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:52px;background:var(--pl);color:#00201a;border:none;border-radius:var(--rxl);font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,107,92,.2);transition:all var(--tr);}
.btn-p:active{transform:scale(.98);}
.btn-p.larval-btn{background:#1565c0;color:#fff;box-shadow:0 2px 12px rgba(21,101,192,.25);}
.btn-s{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:46px;background:var(--sfc);color:var(--primary);border:2px solid var(--primary);border-radius:var(--rxl);font-size:13px;font-weight:700;cursor:pointer;transition:all var(--tr);}
.btn-s:active{transform:scale(.98);}
.btn-s.larval-s{color:var(--larval);border-color:var(--larval);}
.stepper{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;}
.step-bar{height:4px;border-radius:2px;background:var(--olv);transition:background .4s;}
.step-bar.done{background:var(--primary);}
.step-bar.done.lrv{background:var(--larval);}
.step-bar.active{background:var(--pl);}
.step-bar.active.lrv{background:#64b5f6;}
.stepper-lbl{text-align:center;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--osv);margin-bottom:16px;}
.sum-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.sum-cell{background:var(--sfc);border:1px solid var(--olv);border-radius:var(--rmd);padding:9px 4px;text-align:center;}
.sum-lbl{font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--osv);margin-bottom:3px;}
.sum-val{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--primary);}
.sum-val.lv{color:var(--larval);}
.hec-card{background:var(--sfc);border:2px solid var(--pl);border-radius:var(--rlg);padding:14px;margin-bottom:14px;}
.hec-card.lrv{border-color:#64b5f6;}
.hec-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
.hec-lbl{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--primary);}
.hec-lbl.lrv{color:var(--larval);}
.hec-badge{background:rgba(0,191,165,.15);border-radius:20px;padding:3px 10px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--primary);}
.hec-badge.lrv{background:rgba(21,101,192,.12);color:var(--larval);}
.hnum-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(0,107,92,.07);border:2px solid var(--pd);border-radius:var(--rmd);padding:10px 14px;margin-bottom:12px;}
.hnum-bar.lrv{background:rgba(21,101,192,.07);border-color:#64b5f6;}
.hnum-display{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--primary);text-align:center;flex:1;}
.hnum-display.lrv{color:var(--larval);}
.cnt-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--olv);background:var(--sfc);color:var(--primary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;transition:all var(--tr);}
.cnt-btn:active{background:var(--primary);color:#fff;border-color:var(--primary);}
.cnt-val{font-family:var(--mono);font-size:19px;font-weight:600;min-width:36px;text-align:center;color:var(--os);}
.cnt-val.lv{color:var(--larval);}
.cnt-row{display:flex;align-items:center;gap:8px;}
.time-now-row{display:flex;gap:5px;align-items:stretch;}
.time-inp{flex:1;min-width:0;height:var(--touch);padding:0 9px;background:var(--sfc);border:2px solid var(--olv);border-radius:var(--rmd);font-family:var(--mono);font-size:14px;color:var(--os);appearance:none;-webkit-appearance:none;}
.time-inp:focus{outline:none;border-color:var(--primary);}
.now-btn{height:var(--touch);padding:0 13px;color:#fff;border:none;border-radius:var(--rmd);font-size:11px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:5px;flex-shrink:0;letter-spacing:.05em;transition:all var(--tr);}
.now-btn.start{background:var(--primary);}
.now-btn.end{background:var(--err);}
.time-calc{display:flex;align-items:center;gap:8px;background:var(--sf);border:1px solid var(--olv);border-radius:var(--rmd);padding:10px 13px;margin-bottom:12px;font-size:12px;color:var(--osv);}
.time-calc.ok{background:var(--gbg);border-color:var(--pd);color:var(--primary);}
.ctype-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.ctype-btn{border:2px solid var(--olv);border-radius:var(--rmd);background:var(--sfc);cursor:pointer;padding:11px 8px;text-align:center;transition:all var(--tr);}
.ctype-btn.active{border-color:var(--primary);background:var(--gbg);}
.ctype-name{font-size:12px;font-weight:700;color:var(--os);margin:6px 0 3px;}
.ctype-sub{font-size:10px;color:var(--osv);}
.matrix-wrap{overflow-x:auto;border-radius:var(--rlg);border:1px solid var(--olv);background:var(--sfc);margin-bottom:10px;}
.mtbl{width:100%;border-collapse:collapse;min-width:300px;}
.mtbl thead tr{background:var(--primary);}
.mtbl.lrv thead tr{background:var(--larval);}
.mtbl thead th{padding:8px 4px;font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;text-align:center;color:#fff;}
.mtbl thead th:first-child{text-align:left;padding-left:10px;min-width:120px;}
.mtbl thead th.ind{background:rgba(0,107,92,.82);}
.mtbl thead th.out{background:rgba(0,80,70,.9);}
.mtbl thead th.bit{background:rgba(180,83,9,.9);}
.mtbl thead th.lrv1{background:rgba(21,101,192,.85);}
.mtbl thead th.lrv2{background:rgba(13,71,161,.9);}
.mtbl tbody tr{border-bottom:1px solid var(--sfl);}
.mtbl tbody tr:last-child{border-bottom:none;}
.mtbl tbody tr.grp-hdr td{font-size:8.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;background:rgba(0,0,0,.03);padding:4px 10px;}
.mtbl td{padding:5px 3px;text-align:center;vertical-align:middle;}
.mtbl td:first-child{text-align:left;padding-left:10px;font-size:11px;font-weight:600;font-style:italic;color:var(--os);}
.mb{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--olv);background:var(--sfc);color:var(--primary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all var(--tr);}
.mb:active{background:var(--primary);color:#fff;}
.mb.bite{color:var(--amber);}
.mb.bite:active{background:var(--amber);}
.mb.lrv{color:var(--larval);}
.mb.lrv:active{background:var(--larval);color:#fff;}
.mb.lrv2c{color:#1565c0;}
.mb.lrv2c:active{background:#1565c0;color:#fff;}
.mv{font-family:var(--mono);font-size:13px;font-weight:600;min-width:22px;text-align:center;color:var(--os);}
.mv.teal{color:var(--primary);}
.mv.amber{color:var(--amber);}
.mv.lv{color:var(--larval);}
.counter{display:flex;align-items:center;justify-content:center;gap:2px;}
.hli{background:var(--sfc);border:1px solid var(--olv);border-radius:var(--rmd);margin-bottom:7px;overflow:hidden;}
.hli-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;cursor:pointer;gap:8px;}
.hli-left{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
.hli-num{width:32px;height:32px;border-radius:50%;background:rgba(0,191,165,.15);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--primary);}
.hli-num.lrv{background:rgba(21,101,192,.12);color:var(--larval);}
.hli-info{flex:1;min-width:0;}
.hli-name{font-size:13px;font-weight:700;color:var(--os);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hli-meta{font-size:10px;color:var(--osv);display:flex;gap:7px;flex-wrap:wrap;}
.hli-right{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.hli-total{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--primary);}
.hli-total.lrv{color:var(--larval);}
.hli-del{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(186,26,26,.3);background:#fff;color:var(--err);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.hli-body{display:none;border-top:1px solid var(--sfl);padding:10px 12px;}
.hli-body.open{display:block;}
.hli-sp-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.hli-sp-tbl th{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--osv);padding:4px 6px;text-align:center;background:rgba(0,107,92,.05);}
.hli-sp-tbl th:first-child{text-align:left;}
.hli-sp-tbl td{padding:4px 6px;border-top:1px solid var(--sfl);text-align:center;color:var(--os);}
.hli-sp-tbl td:first-child{text-align:left;font-style:italic;}
.gps-card{background:var(--sfc);border:1px solid var(--olv);border-radius:var(--rlg);padding:13px;margin-bottom:13px;}
.gps-top{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.gps-dot{width:44px;height:44px;border-radius:50%;background:rgba(0,191,165,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .3s;}
.gps-dot.pulse{animation:gpsp 1.5s ease-out infinite;}
@keyframes gpsp{0%{box-shadow:0 0 0 0 rgba(0,191,165,.4);}70%{box-shadow:0 0 0 10px rgba(0,191,165,0);}100%{box-shadow:0 0 0 0 rgba(0,191,165,0);}}
.gps-info h4{font-size:13px;font-weight:600;color:var(--os);margin-bottom:2px;}
.gps-info p{font-family:var(--mono);font-size:10px;color:var(--osv);}
.gps-pill{display:flex;align-items:center;gap:7px;border-radius:var(--rmd);padding:8px 11px;margin-bottom:10px;font-size:11px;font-weight:600;}
.gps-upd-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:40px;border:2px solid var(--primary);border-radius:var(--rmd);background:transparent;color:var(--primary);cursor:pointer;font-size:12px;font-weight:700;transition:all var(--tr);}
.man-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mf label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--osv);display:block;margin-bottom:4px;}
.mf input{width:100%;height:36px;padding:0 9px;background:var(--sfc);border:1.5px solid var(--olv);border-radius:var(--rsm);font-family:var(--mono);font-size:13px;color:var(--os);appearance:none;-webkit-appearance:none;}
.mf input:focus{outline:none;border-color:var(--primary);}
.apply-btn{margin-top:9px;width:100%;height:33px;background:var(--primary);color:#fff;border:none;border-radius:var(--rmd);font-size:12px;font-weight:700;cursor:pointer;}
.idx-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px;}
.idx-card{background:var(--sfc);border:1px solid var(--olv);border-radius:var(--rlg);padding:11px;text-align:center;}
.idx-card.hl{border-color:var(--pl);background:var(--gbg);}
.idx-card.am{border-color:#f59e0b;background:var(--amberbg);}
.idx-card.lv{border-color:#64b5f6;background:rgba(21,101,192,.05);}
.idx-lbl{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--osv);margin-bottom:4px;}
.idx-val{font-family:var(--mono);font-size:19px;font-weight:600;color:var(--primary);}
.idx-val.am{color:var(--amber);}
.idx-val.lv{color:var(--larval);}
.idx-sub{font-size:9px;color:var(--osv);margin-top:2px;}
.r-card{background:var(--sfc);border-radius:var(--rlg);border:1px solid var(--olv);padding:13px;margin-bottom:11px;}
.r-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--sfl);}
.r-row:last-child{border-bottom:none;}
.r-key{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--osv);flex-shrink:0;margin-right:8px;padding-top:1px;}
.r-val{font-size:13px;color:var(--os);text-align:right;max-width:65%;font-weight:500;word-break:break-word;}
.r-val.mono{font-family:var(--mono);}
.sp-rev-wrap{overflow-x:auto;border-radius:var(--rlg);border:1px solid var(--olv);background:var(--sfc);margin-bottom:13px;}
.sp-rev-tbl{width:100%;border-collapse:collapse;min-width:280px;}
.sp-rev-tbl thead tr{background:var(--primary);}
.sp-rev-tbl.lrv thead tr{background:var(--larval);}
.sp-rev-tbl thead th{padding:7px 8px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;text-align:center;color:#fff;}
.sp-rev-tbl thead th:first-child{text-align:left;padding-left:10px;}
.sp-rev-tbl tbody tr{border-bottom:1px solid var(--sfl);}
.sp-rev-tbl td{padding:6px 8px;font-size:11px;text-align:center;color:var(--os);}
.sp-rev-tbl td:first-child{text-align:left;font-style:italic;font-weight:600;padding-left:10px;}
.sp-rev-tbl .tot-tr td{background:rgba(0,107,92,.06);font-weight:700;border-top:2px solid var(--pl);}
.sp-rev-tbl .grp-hdr td{font-size:8.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;background:rgba(0,0,0,.04);padding:4px 10px;}
.exp-wrap{background:var(--sfc);border:1px solid var(--olv);border-radius:var(--rlg);padding:14px;margin-bottom:11px;}
.exp-ttl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--osv);margin-bottom:10px;}
.exp-btn{display:flex;align-items:center;gap:9px;padding:11px 12px;background:var(--sf);border:1px solid var(--olv);border-radius:var(--rmd);cursor:pointer;font-size:13px;font-weight:600;color:var(--primary);transition:all var(--tr);}
.exp-btn:active{border-color:var(--primary);background:var(--gbg);}
.exp-sub{font-size:10px;color:var(--osv);font-weight:400;margin-top:2px;}
.email-row{display:flex;gap:7px;margin-bottom:9px;}
.email-inp{flex:1;height:42px;padding:0 11px;background:var(--sf);border:1.5px solid var(--olv);border-radius:var(--rmd);font-family:var(--mono);font-size:13px;color:var(--os);}
.email-inp:focus{outline:none;border-color:var(--primary);}
.email-send{height:42px;padding:0 12px;background:var(--primary);color:#fff;border:none;border-radius:var(--rmd);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all var(--tr);}

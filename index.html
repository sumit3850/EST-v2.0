<script>
// Root router: installed PWAs (standalone) go straight to the field app;
// browser visits land on the Operations Console sign-in.
(function(){
  var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  location.replace(standalone ? 'app.html' : 'signin.html');
})();
</script>
</head>
